services:
  rng:
    build: .
    image: rng:local
    container_name: rng
    restart: unless-stopped
    
    # CPU limits (~50% by default)
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 2G
    
    volumes:
      - rng-data:/home/rng/.rng
    
    # Expose P2P port (RPC stays internal for security)
    ports:
      - "8433:8433"  # P2P
      # Uncomment to expose RPC (NOT recommended for production):
      # - "127.0.0.1:8432:8432"
    
    # Health check
    healthcheck:
      test: ["CMD", "rng-cli", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  rng-data:
    driver: local

# Usage:
# ------
# Start:
#   docker compose up -d --build
#
# Check status:
#   docker compose exec rng rng-cli getblockhash 0
#   docker compose exec rng rng-cli getconnectioncount
#
# Create wallet:
#   docker compose exec rng rng-cli createwallet "miner"
#
# Get address:
#   docker compose exec rng rng-cli -rpcwallet=miner getnewaddress
#
# View logs:
#   docker compose logs -f rng
#
# Stop:
#   docker compose down
#
# Stop and remove data:
#   docker compose down -v
