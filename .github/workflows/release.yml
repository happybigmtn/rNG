name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Existing release tag to build, for example v3.0.0
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

defaults:
  run:
    shell: bash

jobs:
  unix-artifacts:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64 release
            runner: ubuntu-24.04
            platform: linux-x86_64
          - name: Linux ARM64 native release
            runner: ubuntu-24.04-arm
            platform: linux-arm64
          - name: macOS x86_64 release
            runner: macos-13
            platform: macos-x86_64
          - name: macOS ARM64 native release
            runner: macos-14
            platform: macos-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Resolve release version
        env:
          INPUT_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
        run: |
          version="${INPUT_VERSION:-}"
          if [ -z "$version" ]; then
            version="${GITHUB_REF_NAME}"
          fi
          [ -n "$version" ] || { echo "Could not resolve release version" >&2; exit 1; }
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git ninja-build pkg-config python3 libboost-all-dev libevent-dev libsqlite3-dev libssl-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1
        run: |
          brew install --quiet cmake ninja pkgconf boost libevent sqlite openssl@3

      - name: Configure release build
        run: |
          openssl_flag=()
          if [ "${RUNNER_OS}" = "macOS" ]; then
            openssl_flag=(-DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)")
          fi

          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON \
            -DBUILD_GUI=OFF \
            -DBUILD_BENCH=OFF \
            -DENABLE_IPC=OFF \
            -DWITH_ZMQ=OFF \
            -DENABLE_WALLET=ON \
            "${openssl_flag[@]}"

      - name: Build release binaries and RandomX test
        run: cmake --build build --parallel --target rngd rng-cli test_bitcoin

      - name: Verify RandomX on native runner
        run: build/bin/test_bitcoin --run_test=randomx_tests

      - name: Package release tarball
        run: |
          scripts/build-release.sh \
            --version "$RELEASE_VERSION" \
            --platform "${{ matrix.platform }}" \
            --build-dir build \
            --output-dir dist \
            --skip-build

      - name: Attest release tarball
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: dist/rng-*.tar.gz

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            dist/rng-*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error

  windows-artifact:
    name: Windows x86_64 release
    runs-on: windows-2022
    timeout-minutes: 180
    env:
      PYTHONUTF8: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Resolve release version
        env:
          INPUT_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
        run: |
          version="${INPUT_VERSION:-}"
          if [ -z "$version" ]; then
            version="${GITHUB_REF_NAME}"
          fi
          [ -n "$version" ] || { echo "Could not resolve release version" >&2; exit 1; }
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Configure Developer Command Prompt for Microsoft Visual C++
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure vcpkg
        run: |
          echo "set(VCPKG_BUILD_TYPE release)" >> "${VCPKG_INSTALLATION_ROOT}/triplets/x64-windows.cmake"
          sed -i '1s/^/set(ENV{CMAKE_POLICY_VERSION_MINIMUM} 3.5)\n/' "${VCPKG_INSTALLATION_ROOT}/scripts/ports.cmake"

      - name: Restore vcpkg binary cache
        uses: actions/cache/restore@v4
        id: vcpkg-binary-cache
        with:
          path: ~/AppData/Local/vcpkg/archives
          key: release-windows-vcpkg-${{ hashFiles('vcpkg.json') }}

      - name: Configure release build
        run: |
          cmake -B build --preset vs2022 \
            -DCMAKE_TOOLCHAIN_FILE="${VCPKG_INSTALLATION_ROOT}/scripts/buildsystems/vcpkg.cmake" \
            -DBUILD_GUI=OFF \
            -DBUILD_BENCH=OFF \
            -DBUILD_TESTS=ON \
            -DENABLE_IPC=OFF \
            -DWITH_ZMQ=OFF \
            -DENABLE_WALLET=ON

      - name: Save vcpkg binary cache
        uses: actions/cache/save@v4
        if: steps.vcpkg-binary-cache.outputs.cache-hit != 'true'
        with:
          path: ~/AppData/Local/vcpkg/archives
          key: release-windows-vcpkg-${{ hashFiles('vcpkg.json') }}

      - name: Build release binaries and RandomX test
        run: cmake --build build --config Release --parallel --target rngd rng-cli test_bitcoin

      - name: Verify RandomX on Windows
        run: build/bin/Release/test_bitcoin.exe --run_test=randomx_tests

      - name: Package release tarball
        run: |
          scripts/build-release.sh \
            --version "$RELEASE_VERSION" \
            --platform windows-x86_64 \
            --build-dir build \
            --output-dir dist \
            --skip-build

      - name: Attest release tarball
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: dist/rng-*.tar.gz

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x86_64
          path: |
            dist/rng-*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-24.04
    needs:
      - unix-artifacts
      - windows-artifact
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}
          fetch-depth: 0

      - name: Resolve release version
        env:
          INPUT_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
        run: |
          version="${INPUT_VERSION:-}"
          if [ -z "$version" ]; then
            version="${GITHUB_REF_NAME}"
          fi
          [ -n "$version" ] || { echo "Could not resolve release version" >&2; exit 1; }
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: downloaded-artifacts

      - name: Assemble release directory
        run: |
          mkdir -p dist
          find downloaded-artifacts -name 'rng-*.tar.gz' -exec cp {} dist/ \;
          find downloaded-artifacts -name SHA256SUMS -exec cat {} \; | sort -k2 > dist/SHA256SUMS
          cp bootstrap/rng-mainnet-29944-datadir.tar.gz dist/
          cp bootstrap/rng-mainnet-29944.utxo dist/
          (cd dist && sha256sum rng-mainnet-29944-datadir.tar.gz rng-mainnet-29944.utxo >> SHA256SUMS)
          sort -k2 -o dist/SHA256SUMS dist/SHA256SUMS
          expected_count=5
          actual_count="$(find dist -maxdepth 1 -name "rng-${RELEASE_VERSION}-*.tar.gz" | wc -l | tr -d ' ')"
          [ "$actual_count" = "$expected_count" ] || {
            echo "Expected $expected_count release tarballs, found $actual_count" >&2
            find dist -maxdepth 1 -type f -print >&2
            exit 1
          }
          (cd dist && sha256sum -c SHA256SUMS)

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_VERSION" >/dev/null 2>&1; then
            gh release upload "$RELEASE_VERSION" dist/* --clobber
          else
            gh release create "$RELEASE_VERSION" dist/* \
              --verify-tag \
              --title "$RELEASE_VERSION" \
              --notes "RNG $RELEASE_VERSION release artifacts."
          fi
