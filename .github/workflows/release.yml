name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-22.04
            build_mode: native
          - platform: linux-arm64
            runner: ubuntu-22.04
            build_mode: docker-arm64
          - platform: macos-x86_64
            runner: macos-13
            build_mode: native
          - platform: macos-arm64
            runner: macos-14
            build_mode: native
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init RandomX submodule
        run: git submodule update --init --recursive -- src/crypto/randomx

      - name: Install Linux dependencies
        if: runner.os == 'Linux' && matrix.build_mode == 'native'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git \
            libboost-all-dev libssl-dev libevent-dev libsqlite3-dev python3

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake boost openssl@3 libevent sqlite

      - name: Build native binaries
        if: matrix.build_mode == 'native'
        run: |
          OPENSSL_FLAG=""
          if [ "${{ runner.os }}" = "macOS" ]; then
            OPENSSL_FLAG="-DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3)"
          fi
          cmake -B build -DBUILD_TESTING=OFF -DENABLE_IPC=OFF -DWITH_ZMQ=OFF -DENABLE_WALLET=ON ${OPENSSL_FLAG}
          cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu) --target rngd rng-cli

      - name: Verify RandomX vendored checkout stayed clean
        run: git diff --exit-code -- src/crypto/randomx

      - name: Set up QEMU
        if: matrix.build_mode == 'docker-arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build ARM64 binaries in container
        if: matrix.build_mode == 'docker-arm64'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/Dockerfile.arm64
          platforms: linux/arm64
          push: false
          outputs: type=local,dest=./output

      - name: Normalize ARM64 build output
        if: matrix.build_mode == 'docker-arm64'
        run: |
          mkdir -p build/bin
          cp output/rngd build/bin/rngd 2>/dev/null || cp output/usr/local/bin/rngd build/bin/rngd
          cp output/rng-cli build/bin/rng-cli 2>/dev/null || cp output/usr/local/bin/rng-cli build/bin/rng-cli

      - name: Package deterministic release tarball
        run: |
          chmod +x scripts/build-release.sh
          ./scripts/build-release.sh \
            --version "${{ github.ref_name }}" \
            --platform "${{ matrix.platform }}" \
            --build-dir build \
            --output-dir dist \
            --skip-build

      - name: Attest binary release asset
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: dist/rng-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: dist/rng-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz

  release:
    needs: build-binaries
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p dist
          find artifacts -name "*.tar.gz" -exec mv {} dist/ \;
          cp bootstrap/rng-mainnet-15091.utxo dist/
          cp bootstrap/rng-mainnet-15244-datadir.tar.gz dist/
          (
            cd dist
            printf '%s\n' * | LC_ALL=C sort | xargs sha256sum > SHA256SUMS
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: |
            ## RNG ${{ github.ref_name }}

            Tagged releases are the public install target. The release tarballs are reproducibly packaged, include the mining helper scripts, and carry GitHub build provenance attestations.

            ### Quick install
            ```bash
            curl -fsSLO https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/install.sh
            less install.sh
            RNG_VERSION=${{ github.ref_name }} bash install.sh --add-path --bootstrap
            ```

            ### Verify the release
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd rng
            ./scripts/verify-release.sh --version ${{ github.ref_name }} --platform linux-x86_64
            ```

            ### Manual attestation verification
            ```bash
            gh attestation verify rng-${{ github.ref_name }}-linux-x86_64.tar.gz --repo ${{ github.repository }}
            ```

            ### Bundled bootstrap assets
            - `rng-mainnet-15244-datadir.tar.gz`
            - `rng-mainnet-15091.utxo`
            - `rng-install-public-node`
            - `rng-install-public-miner`
            - `rngd.service`
            - `rng.conf.example`
            - `PUBLIC-NODE.md`
